<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossTown — Verify Email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0F172A;
      color: #E2E8F0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1E293B;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .logo .cross { color: #DC2626; }
    .logo .town { color: #2563EB; }
    .tagline { color: #94A3B8; font-size: 13px; margin-bottom: 32px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .message { color: #94A3B8; font-size: 15px; line-height: 22px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(251,191,36,0.2);
      border-top-color: #FBBF24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="cross">CROSS</span><span class="town">TOWN</span></div>
    <div class="tagline">Date Your Rival</div>
    <div id="content">
      <div class="spinner"></div>
      <div class="title">Verifying your email...</div>
      <div class="message">Just a moment.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
    import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyCYs97PnmzvUZ12LzPStIcJjRgUT8XOYKc",
      authDomain: "crosstown-4476c.firebaseapp.com",
      projectId: "crosstown-4476c",
    });
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");
    const content = document.getElementById("content");

    function show(icon, title, msg) {
      content.innerHTML = `
        <div class="icon">${icon}</div>
        <div class="title">${title}</div>
        <div class="message">${msg}</div>
      `;
    }

    if (mode === "verifyEmail" && oobCode) {
      try {
        await applyActionCode(auth, oobCode);
        show("\u2705", "You're verified!", "Welcome to CrossTown. Head back to the app \u2014 it'll update automatically.");
      } catch (error) {
        if (error.code === "auth/expired-action-code" || error.code === "auth/invalid-action-code") {
          show("\u23F0", "Link expired", 'Open the app and tap "Resend" to get a new one.');
        } else {
          show("\u274C", "Something went wrong", 'Open the app and tap "Resend" to get a new verification email.');
        }
      }
    } else {
      show("\u274C", "Invalid link", "This verification link is not valid.");
    }
  </script>
</body>
</html>
