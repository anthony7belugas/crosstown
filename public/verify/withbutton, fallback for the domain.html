<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossTown — Verify Email</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0F172A;
      color: #E2E8F0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1E293B;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .logo .cross { color: #DC2626; }
    .logo .town { color: #2563EB; }
    .tagline { color: #94A3B8; font-size: 13px; margin-bottom: 32px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .message { color: #94A3B8; font-size: 15px; line-height: 22px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(251,191,36,0.2);
      border-top-color: #FBBF24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .verify-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 36px;
      background: #FBBF24;
      color: #1E293B;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .verify-btn:hover { opacity: 0.9; }
    .verify-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="cross">CROSS</span><span class="town">TOWN</span></div>
    <div class="tagline">Date Your Rival</div>
    <div id="content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
    import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyCYs97PnmzvUZ12LzPStIcJjRgUT8XOYKc",
      authDomain: "crosstown-4476c.firebaseapp.com",
      projectId: "crosstown-4476c",
    });

    const auth = getAuth(app);
    const content = document.getElementById("content");

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");

    // Show button instead of auto-verifying.
    // This prevents email security scanners (Proofpoint, Gmail Safe Browsing)
    // from prefetching the link and consuming the oobCode before the user clicks.
    function showVerifyButton() {
      if (mode !== "verifyEmail" || !oobCode) {
        showError();
        return;
      }

      content.innerHTML = `
        <div class="icon">\u2709\uFE0F</div>
        <div class="title">Confirm your email</div>
        <div class="message">Tap the button below to finish verifying your student email.</div>
        <button class="verify-btn" id="verifyBtn">Verify My Email</button>
      `;

      document.getElementById("verifyBtn").addEventListener("click", handleVerification);
    }

    async function handleVerification() {
      // Show loading state
      content.innerHTML = `
        <div class="spinner"></div>
        <div class="title">Verifying your email...</div>
        <div class="message">Just a moment.</div>
      `;

      try {
        await applyActionCode(auth, oobCode);
        showSuccess();
      } catch (error) {
        console.error("Verification error:", error);
        if (error.code === "auth/invalid-action-code") {
          showExpired();
        } else {
          showError();
        }
      }
    }

    function showSuccess() {
      content.innerHTML = `
        <div class="icon">\u2705</div>
        <div class="title">You're verified!</div>
        <div class="message">Welcome to CrossTown. Head back to the app \u2014 it'll update automatically.</div>
      `;
    }

    function showExpired() {
      content.innerHTML = `
        <div class="icon">\u23F0</div>
        <div class="title">Link expired</div>
        <div class="message">This verification link has already been used or expired.<br/>Open the app and tap "Resend" to get a new one.</div>
      `;
    }

    function showError() {
      content.innerHTML = `
        <div class="icon">\u274C</div>
        <div class="title">Something went wrong</div>
        <div class="message">Open the app and tap "Resend" to get a new verification email.</div>
      `;
    }

    // Show the button — do NOT auto-verify on page load
    showVerifyButton();
  </script>
</body>
</html>
